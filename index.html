<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f2027" />
  <title>Seinfeld Randomizer</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background"></div>

  <a
    href="https://github.com/OrF8/RandomSeinfeldEpisode"
    target="_blank"
    rel="noopener noreferrer"
    class="github-float"
    aria-label="View source on GitHub"
    title="View source on GitHub"
  >
    <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
      -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
      .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
      0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
      0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27
      c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
      0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
      0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
      c0-4.42-3.58-8-8-8z"/>
    </svg>
  </a>

  <main class="container">
    <div class="top-bar">
      <button id="themeToggle" class="top-button" type="button">🌙 Dark mode</button>
      <button id="installBtn" class="top-button hidden" type="button">📲 Install app</button>
    </div>

    <h1 class="title">Seinfeld Randomizer</h1>
    <p class="subtitle">Uniformly sampled from all 180 episodes</p>

    <button id="sampleBtn" class="glow-button" type="button">🎲 Pick an Episode</button>

    <section id="result" class="card hidden">
      <div class="image-wrap" id="swipeArea">
        <img
          id="episodeImage"
          class="episode-image"
          alt="Episode still"
          loading="lazy"
        />
        <div id="imageFallback" class="image-fallback hidden">
          No episode image found
        </div>
      </div>

      <div class="meta">
        <div class="badge">
          Season <span id="season"></span> • Episode <span id="episode"></span>
        </div>

        <h2 id="title" class="episode-title"></h2>

        <p class="swipe-hint">Swipe left or right on the image to get the next episode</p>

        <div class="actions">
          <a
            id="netflixLink"
            class="netflix-link"
            href="https://www.netflix.com/title/70153373"
            target="_blank"
            rel="noopener noreferrer"
          >
            📺 Watch on Netflix
          </a>
        </div>
      </div>
    </section>

    <p class="credit">Episode images powered by TVmaze</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
